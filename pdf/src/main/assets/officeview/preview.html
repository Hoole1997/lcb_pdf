<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件预览</title>
    <style>
        .preview-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .preview-content {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        #preview-container {
            width: 100%;
            height: 100%;
            border: none;
        }
        .error-message {
            color: red;
            padding: 10px;
            margin: 10px;
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 4px;
        }
        /* 添加文本预览样式 */
        .text-preview {
            padding: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            background: #fff;
            color: #333;
        }
        /* 添加加载状态样式 */
        .loading-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="preview-container">
    <div class="preview-content">
        <div id="preview-container"></div>
    </div>
</div>

<!-- 引入PDF.js核心库 -->
<script src="libs/pdf.min.js"></script>

<!-- 引入预览组件 -->
<script src="libs/js-preview-docx.umd.js"></script>
<script src="libs/js-preview-excel.umd.js"></script>
<script src="libs/js-preview-pdf.umd.js"></script>
<script src="libs/pptx-preview.umd.js"></script>
<link rel="stylesheet" href="libs/js-preview-docx.css">
<link rel="stylesheet" href="libs/js-preview-excel.css">

<script>
    // 显示加载状态
    function showLoading(message = '加载中...') {
        const container = document.querySelector('.preview-content');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading-container';
        loadingDiv.innerHTML = `
            <div class="loading-spinner"></div>
            <div class="loading-text">${message}</div>
        `;
        container.appendChild(loadingDiv);
    }

    // 隐藏加载状态
    function hideLoading() {
        const loadingDiv = document.querySelector('.loading-container');
        if (loadingDiv) {
            loadingDiv.remove();
        }
    }

    // 检查组件是否加载成功
    async function checkComponentLoaded(componentName, retryCount = 3, retryDelay = 1000) {
        console.log(`检查组件 ${componentName} 加载状态...`);

        for (let i = 0; i < retryCount; i++) {
            const component = window[componentName];
            console.log(`${componentName}:`, component);

            if (component) {
                return component;
            }

            if (i < retryCount - 1) {
                console.log(`组件 ${componentName} 未加载，${retryDelay/1000}秒后重试...`);
                await new Promise(resolve => setTimeout(resolve, retryDelay));
            }
        }

        throw new Error(`组件 ${componentName} 未正确加载`);
    }

    // 配置PDF worker
    window.pdfjsLib = window.pdfjsLib || {};
    window.pdfjsLib.GlobalWorkerOptions = window.pdfjsLib.GlobalWorkerOptions || {};

    // 检查是否在Android环境中
    if (window.Android && window.Android.readFile) {
        // 在Android环境中，禁用worker
        window.pdfjsLib.disableWorker = true;
    } else {
        // 在其他环境中，使用worker
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'libs/pdf.worker.min.js';
    }

    let currentPreviewer = null;

    // 获取文件类型
    function getFileType(url) {
        const extension = url.split('.').pop()?.toLowerCase();
        const typeMap = {
            // Word文档
            'doc': 'docx',
            'docx': 'docx',

            // Excel表格
            'xls': 'xlsx',
            'xlsx': 'xlsx',
            'csv': 'xlsx',

            // PDF文档
            'pdf': 'pdf',

            // PPT文档
            'ppt': 'pptx',
            'pptx': 'pptx',

            // 文本文件
            'txt': 'txt',
            'text': 'txt',
            'log': 'txt'
        };
        return typeMap[extension] || null;
    }

    // 初始化预览器
    async function initPreviewer(fileType) {
        try {
            const container = document.getElementById('preview-container');
            container.innerHTML = ''; // 清空容器

            switch(fileType) {
                case 'docx':
                    const docxComponent = await checkComponentLoaded('jsPreviewDocx');
                    return docxComponent.init(container);
                case 'xlsx':
                    const excelComponent = await checkComponentLoaded('jsPreviewExcel');
                    return excelComponent.init(container);
                case 'pdf':
                    const pdfComponent = await checkComponentLoaded('jsPreviewPdf');
                    return pdfComponent.init(container, {
                        onError: (e) => {
                            console.log('PDF预览发生错误', e);
                            showError(e);
                            hideLoading();
                        },
                        onRendered: () => {
                            console.log('PDF渲染完成');
                            hideLoading();
                        }
                    });
                case 'pptx':
                    const pptxComponent = await checkComponentLoaded('pptxPreview');
                    return pptxComponent.init(container, {
                        width: container.clientWidth,
                        height: container.clientHeight
                    });
                case 'txt':
                    // 创建文本预览器
                    return {
                        preview: async (content) => {
                            try {
                                // 如果是ArrayBuffer，转换为文本
                                let text;
                                if (content instanceof ArrayBuffer) {
                                    const decoder = new TextDecoder('utf-8');
                                    text = decoder.decode(content);
                                } else {
                                    text = content;
                                }

                                // 创建预览容器
                                const previewDiv = document.createElement('div');
                                previewDiv.className = 'text-preview';
                                previewDiv.textContent = text;
                                container.appendChild(previewDiv);
                            } catch (error) {
                                console.error('文本预览失败:', error);
                                throw error;
                            }
                        }
                    };
                default:
                    throw new Error('不支持的文件类型');
            }
        } catch (error) {
            console.error('初始化预览器失败:', error);
            throw error;
        }
    }

    // 读取文件内容
    async function readFileContent(filePath) {
        return new Promise((resolve, reject) => {
            // 检查是否在Android环境中
            if (window.Android && window.Android.readFile) {
                // 设置回调函数
                window.handleFileReadSuccess = function(path, base64Data) {
                    if (path === filePath) {
                        // 将Base64字符串转换为ArrayBuffer
                        const binaryString = atob(base64Data);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        resolve(bytes.buffer);
                    }
                };

                window.handleFileReadError = function(path, error) {
                    if (path === filePath) {
                        reject(new Error(error));
                    }
                };

                // 调用Android接口
                window.Android.readFile(filePath, 'callback');
            } else {
                reject(new Error('不支持的文件读取方式'));
            }
        });
    }

    // 显示错误信息
    function showError(message) {
        const container = document.getElementById('preview-container');
        container.innerHTML = `<div class="error-message">${message}</div>`;
    }

    // 预览文件
    async function previewFile(fileUrl) {
        if (!fileUrl) {
            showError('文件路径不能为空');
            return;
        }

        try {
            // 显示加载状态
            showLoading('正在加载文件...');

            // 获取文件类型
            const fileType = getFileType(fileUrl);
            if (!fileType) {
                throw new Error('不支持的文件类型');
            }

            // 初始化对应的预览器
            currentPreviewer = await initPreviewer(fileType);

            // 判断是否是本地文件路径
            if (fileUrl.startsWith('file://') || fileUrl.startsWith('/')) {
                // 读取本地文件内容
                const fileBuffer = await readFileContent(fileUrl);
                // 预览文件
                await currentPreviewer.preview(fileBuffer);
            } else {
                // 预览远程文件
                const response = await fetch(fileUrl);
                if (!response.ok) {
                    throw new Error(`文件读取失败: ${response.status} ${response.statusText}`);
                }
                const fileBuffer = await response.arrayBuffer();
                // 预览文件
                await currentPreviewer.preview(fileBuffer);
            }
            console.log('文件预览完成');
        } catch (error) {
            console.error('预览失败:', error);
            showError(error.message || '预览失败');
        } finally {
            // 隐藏加载状态
            hideLoading();
        }
    }

    // 从URL参数中获取文件地址
    function getFileUrlFromParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const url = urlParams.get('url');
        if (url) {
            try {
                // 解码URL参数
                const decodedUrl = decodeURIComponent(url);
                previewFile(decodedUrl);
            } catch (error) {
                console.error('URL解码失败:', error);
                showError('URL解码失败');
            }
        }
    }

    // 页面加载完成后，检查URL参数
    window.onload = function() {
        try {
            // 等待组件加载完成
            setTimeout(() => {
                getFileUrlFromParams();
            }, 1000);
        } catch (error) {
            console.error('组件加载失败:', error);
            showError(error.message);
        }
    };
</script>
</body>
</html>
