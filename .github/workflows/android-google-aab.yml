name: Build google signed AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - pdf/src/google/google-release.keystore

permissions:
  contents: write

concurrency:
  group: google-aab-main
  cancel-in-progress: false

jobs:
  build-google-aab:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_REPO_PATH: pdf/src/google/google-release.keystore
      KEYSTORE_GRADLE_PATH: pdf/src/google/google-release.keystore
      KEYSTORE_ALIAS: google
      KEYSTORE_PASSWORD: google123456
      KEY_PASSWORD: google123456
      GRADLE_JVM_ARGS: -Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+UseParallelGC -Dfile.encoding=UTF-8
      KOTLIN_DAEMON_JVM_ARGS: -Xmx1024m

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable swap for Android bundle build
        run: |
          set -euo pipefail
          sudo swapoff -a || true
          sudo fallocate -l 6G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=6144
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap after setup:"
          free -h

      - name: Ensure google release keystore exists
        id: ensure_keystore
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$KEYSTORE_REPO_PATH")"

          if [ -f "$KEYSTORE_REPO_PATH" ] && [ -s "$KEYSTORE_REPO_PATH" ]; then
            echo "Using existing keystore: $KEYSTORE_REPO_PATH"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore "$KEYSTORE_REPO_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEYSTORE_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=Google Release, OU=Mobile, O=GitHub Actions, L=San Francisco, S=CA, C=US"

          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Commit generated keystore to main
        if: steps.ensure_keystore.outputs.created == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KEYSTORE_REPO_PATH"

          if git diff --cached --quiet; then
            echo "No keystore changes to commit."
            exit 0
          fi

          git commit -m "chore: add google release keystore"
          git push origin HEAD:main

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Configure CI Gradle properties
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle"
          {
            echo "android.enableR8.fullMode=false"
            echo "android.r8.maxWorkers=1"
            echo "android.r8.threadPoolSize=1"
            echo "org.gradle.daemon.performance.disable-logging=true"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=1"
            echo "org.gradle.vfs.watch=false"
            echo "kotlin.incremental=false"
            echo "kotlin.parallel.tasks.in.project=false"
            echo "kotlin.compiler.execution.strategy=in-process"
          } >> "$HOME/.gradle/gradle.properties"
          echo "CI gradle.properties:"
          cat "$HOME/.gradle/gradle.properties"

      - name: Print runner diagnostics
        run: |
          set -euo pipefail
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "CPU:"
          nproc || true
          echo "Memory:"
          free -h || true
          echo "Meminfo:"
          grep -E 'MemTotal|MemFree|MemAvailable|SwapTotal|SwapFree' /proc/meminfo || true
          echo "Disk:"
          df -h || true
          echo "Ulimit:"
          ulimit -a || true
          echo "Java:"
          java -version
          echo "Java VM settings:"
          java -XshowSettings:vm -version 2>&1 | sed -n '1,80p'
          echo "Gradle JVM args: ${GRADLE_JVM_ARGS}"
          echo "Kotlin daemon JVM args: ${KOTLIN_DAEMON_JVM_ARGS}"
          echo "R8 full mode: false (configured in \$HOME/.gradle/gradle.properties)"

      - name: Resolve version info
        id: version_info
        run: |
          set -euo pipefail
          COMMON_GRADLE_ARGS=(
            "-Dorg.gradle.jvmargs=${GRADLE_JVM_ARGS}"
            "-Dkotlin.daemon.jvmargs=${KOTLIN_DAEMON_JVM_ARGS}"
            "-Dkotlin.compiler.execution.strategy=in-process"
            --max-workers=1
            --no-parallel
            --no-watch-fs
            --build-cache
          )

          VERSION_NAME="$(./gradlew -q :pdf:printGoogleReleaseVersionName --console=plain "${COMMON_GRADLE_ARGS[@]}")"
          AAB_NAME="$(./gradlew -q :pdf:printGoogleReleaseAabName --console=plain "${COMMON_GRADLE_ARGS[@]}")"

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "aab_name=$AAB_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed googleRelease AAB
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ env.KEYSTORE_GRADLE_PATH }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ env.KEYSTORE_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          COMMON_GRADLE_ARGS=(
            "-Dorg.gradle.jvmargs=${GRADLE_JVM_ARGS}"
            "-Dkotlin.daemon.jvmargs=${KOTLIN_DAEMON_JVM_ARGS}"
            "-Dkotlin.compiler.execution.strategy=in-process"
            --max-workers=1
            --no-parallel
            --no-watch-fs
            --build-cache
          )
          BUILD_ARGS=(
            -Pandroid.release.optimizeEnabled=false
          )

          echo "Building googleRelease with minify enabled, optimize disabled, and R8 thread pool limited to 1."

          ./gradlew :pdf:bundleGoogleRelease \
            -x lint \
            -x :pdf:lintGoogleRelease \
            -x :pdf:lintVitalGoogleRelease \
            -x :pdf:lintVitalAnalyzeGoogleRelease \
            -x :pdf:lintVitalReportGoogleRelease \
            "${BUILD_ARGS[@]}" \
            "${COMMON_GRADLE_ARGS[@]}" \
            --no-daemon \
            --stacktrace

      - name: Rename AAB output
        id: rename_aab
        run: |
          set -euo pipefail

          AAB_DIR="pdf/build/outputs/bundle/googleRelease"
          TARGET_AAB="$AAB_DIR/${{ steps.version_info.outputs.aab_name }}"
          SOURCE_AAB="$(find "$AAB_DIR" -maxdepth 1 -type f -name '*.aab' | head -n 1)"

          if [ -z "$SOURCE_AAB" ]; then
            echo "No AAB file found in $AAB_DIR" >&2
            exit 1
          fi

          if [ "$SOURCE_AAB" != "$TARGET_AAB" ]; then
            rm -f "$TARGET_AAB"
            mv "$SOURCE_AAB" "$TARGET_AAB"
          fi

          echo "target_aab=$TARGET_AAB" >> "$GITHUB_OUTPUT"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version_info.outputs.aab_name }}
          path: ${{ steps.rename_aab.outputs.target_aab }}
          if-no-files-found: error
          retention-days: 30
